<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP: 禁止内联脚本注入风险；允许连接百炼端点与本地。开发期 electron-vite 会注入额外内容。 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: https: blob:; media-src 'self' file: blob: https:; style-src 'self' 'unsafe-inline'; connect-src 'self' https:;"
    />
    <title>VidForge</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
